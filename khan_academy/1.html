<!DOCTYPE HTML>
<html>
    <head>
        <title>Challenge: Write a Poem</title>
        <meta charset="utf-8">
    </head>
    <body>
    <h1>Оян қазақ!</h1>
    <p>Көзіңді аш, оян қазақ, көтер басты,<br>

Өткізбей қараңғыда бекер жасты.<br>

Жер кетті, дін нашарлап, хал арам боп,<br>

Қарағым, енді жату жарамас-ты.</p>
    </body>
</html>
